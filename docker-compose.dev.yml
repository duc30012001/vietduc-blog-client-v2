services:
    app:
        image: node:22-alpine
        container_name: vietduc-blog-client-dev
        working_dir: /app
        command: sh -c "yarn install && yarn dev"
        ports:
            - '${APP_PORT:-3000}:3000'
        volumes:
            - .:/app
            - /app/node_modules
            - /app/.next
        env_file:
            - .env
        environment:
            - NODE_ENV=development
            - WATCHPACK_POLLING=true
        restart: 'no'
